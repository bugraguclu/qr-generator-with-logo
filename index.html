<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Generator With Logo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    h1 {
      color: #18181b;
      margin-bottom: 24px;
      transform: translateY(-50%);
    }

    input {
      display: block;
      margin-bottom: 16px;
      padding: 10px;
      width: 260px;
      border: 1px solid #d4d4d8;
      border-radius: 8px;
      font-size: 14px;
    }

    canvas {
      border: 1px solid #d4d4d8;
      border-radius: 8px;
      background-color: #ffffff;
      margin-top: 8px;
      width: 300px;
      height: 300px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background-color: #18181b;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background-color: #3f3f46;
    }
    
    #generate {
      width: 260px;
      margin-bottom: 16px;
    }

    .slider-group {
      width: 260px;
      margin-bottom: 16px;
    }

    .slider-header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    label {
      font-size: 13px;
      color: #52525b;
    }

    #sizeBadge {
      background-color: #42424b;
      color: #ffffff;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 6px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slider-limit {
      font-size: 12px;
      color: #71717a;
    }

    input[type="range"] {
      flex: 1;
      padding: 0;
      border: none;
      margin-bottom: 0;
      width: auto;
    }
  </style>
  </style>
</head>
<body>


  <h1>QR Generator With Logo</h1>
  <input type="text" id="url" placeholder="Enter Destination URL">
  <input type="file" id="logo">

  <div class="slider-group">
    <div class="slider-header">
      <label for="logoSize">Logo size</label>
      <span id="sizeBadge">20%</span>
    </div>
    <div class="slider-row">
      <span class="slider-limit">1%</span>
      <input type="range" id="logoSize" min="0.01" max="0.30" step="0.01" value="0.20">
      <span class="slider-limit">30%</span>
    </div>
  </div>

  <button id="generate">Generate</button>
  
  <canvas id="qrCanvas" width="2000" height="2000" ></canvas>

  <div class="actions">
  
    <button id="downloadPng">Download PNG</button>
    <button id="downloadJpeg">Download JPEG</button>
    <button id="copyImage">Copy as PNG</button>
  </div>

  <!-- node-qrcode (browser build) via jsDelivr CDN-->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

  <script>
    const urlInput = document.getElementById("url");
    const logoInput = document.getElementById("logo");
    const canvas = document.getElementById("qrCanvas");
    const ctx = canvas.getContext("2d");
    
    const sizeSlider = document.getElementById("logoSize");
    const sizeBadge = document.getElementById("sizeBadge");
    let logoRatio = 0.20; // Logo size relative to QR code size, user-adjustable

    function generateQR() {
      const url = urlInput.value;
      if (!url) return;

      // 'H' error correction (~30% recovery) keeps the code scannable behind a center logo
      QRCode.toCanvas(canvas, url, { errorCorrectionLevel: "H", width: 2000 }, (error) => {
        if (error) {
          console.error(error);
          // Clear the canvas on error and return
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          return;
        }

        // node-qrcode overrides the display size with inline styles; restore ours
        canvas.style.width = "300px";
        canvas.style.height = "300px";
        
        if (logoInput.files[0]) drawLogo(logoInput.files[0]);
      });
    }

    function drawLogo(logoFile) {
      const reader = new FileReader();
      reader.onload = () => {
        const logo = new Image();
        logo.onload = () => {
          // Preserve the logo's aspect ratio inside a square footprint
          const box = canvas.width * logoRatio;
          const scale = Math.min(box / logo.width, box / logo.height);
          const w = logo.width * scale;
          const h = logo.height * scale;
          const x = (canvas.width - w) / 2;
          const y = (canvas.height - h) / 2;

          // Create white shape-agnostic silhouette of the logo, 
          const stamp = document.createElement("canvas");
          stamp.width = w;
          stamp.height = h;
          const stampCtx = stamp.getContext("2d");
          stampCtx.drawImage(logo, 0, 0, w, h);
          stampCtx.globalCompositeOperation = "source-in";
          stampCtx.fillStyle = "#ffffff";
          stampCtx.fillRect(0, 0, w, h);

          ctx.imageSmoothingQuality = "high";

          // Create soft glow around the logo
          ctx.save();
          ctx.shadowColor = "#ffffff";
          ctx.shadowBlur = box * 0.12;
          for (let i = 0; i < 25; i++) {
            ctx.drawImage(stamp, x, y);
          }
          ctx.restore();

          ctx.drawImage(logo, x, y, w, h);
        };
        logo.src = reader.result;
      };
      reader.readAsDataURL(logoFile);
    }

    function downloadQR(format) {
      if (!urlInput.value) return;

      const link = document.createElement("a");
      link.download = format === "image/jpeg" ? "qr-code.jpg" : "qr-code.png";
      link.href = canvas.toDataURL(format);
      link.click();
    }
    

    async function copyQR() {
      if (!urlInput.value) return;

      
      canvas.toBlob(async (blob) => {
        try {
          await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
        } catch (error) {
          console.error(error);
        }
      }, "image/png");
    }

    document.getElementById("generate").addEventListener("click", generateQR);
    document.getElementById("downloadPng").addEventListener("click", () => downloadQR("image/png"));
    document.getElementById("downloadJpeg").addEventListener("click", () => downloadQR("image/jpeg"));
    document.getElementById("copyImage").addEventListener("click", copyQR);
    sizeSlider.addEventListener("input", () => {
      logoRatio = parseFloat(sizeSlider.value);
      sizeBadge.textContent = Math.round(logoRatio * 100) + "%";
      generateQR();
    });
  </script>
</body>
</html>
